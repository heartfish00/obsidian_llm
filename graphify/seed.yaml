goal: Build a deterministic local Graphify-style Obsidian metadata graph search MVP.
constraints:
  - All new artifacts stay inside ./graphify.
  - Use Python standard library only.
  - Use SQLite with FTS5 for local search.
  - Default local mode does not use LLMs, embeddings, vector databases, semantic inferred edges, realtime sync, or an Obsidian plugin.
  - Optional Search X mode may call xAI Responses API x_search when XAI_API_KEY is set.
inputs:
  - Obsidian Markdown files with YAML frontmatter.
  - Body wikilinks.
  - Optional X/Twitter context from xAI x_search.
outputs:
  - SQLite graph/search database.
  - graph.json
  - graph.html
  - query-result.md
  - query-result.json
acceptance_criteria:
  - Rebuilds a local SQLite DB from Markdown without network access.
  - Extracts explicit metadata and wikilink edges with provenance.
  - Query returns ranked FTS results.
  - Default graph expansion is 1-hop and optional expansion supports 2-hop.
  - Markdown and JSON context packs are generated.
  - Tests pass using only the standard library.
  - Optional --search-x records xAI x_search status/citations and adds external graph nodes with provenance.
non_goals:
  - Full body semantic analysis.
  - Automatic semantic relation inference.
  - Realtime sync.
  - Full vault dashboard.
  - Obsidian plugin SDK work.
